<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDAT — Live Map & Journey Planner</title>
  <meta name="description" content="View live traffic conditions across Malaysia and calculate dynamic AI toll pricing for your journey." />
  
  <!-- Leaflet CSS for Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dashboard-body">

<!-- ── Navigation ── -->
<nav class="nav" id="main-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" style="display:flex; align-items:center;">
      <img src="assets/logo.png" alt="EDAT Logo" style="height: 100px; object-fit: contain;">
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html" class="active">Live Map</a></li>
      <li><a href="analytics.html">Analytics</a></li>
      <li><a href="account.html">My Account</a></li>
    </ul>
    <div class="nav-cta">
      <div class="nav-status"><span class="status-dot active"></span> Tracking Active</div>
      <div id="nav-auth-area"></div>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </div>
</nav>

<!-- ── Dashboard Layout ── -->
<div class="dash-layout">

  <!-- Left Panel (Google Maps Style) -->
  <div class="gm-sidebar">
    
    <!-- Top Form Area -->
    <div class="gm-header">
      <!-- Transport Modes -->
      <div class="gm-modes">
        <button class="gm-mode-btn active" title="Petrol Car" data-val="Petrol">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/><circle cx="7.5" cy="14.5" r="1.5"/><circle cx="16.5" cy="14.5" r="1.5"/></svg>
        </button>
        <button class="gm-mode-btn" title="Electric Vehicle" data-val="EV">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66.19-.34.05-.08.16-.28L11.5 2h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 14.55 11 21 11 21z"/></svg>
        </button>
        <button class="gm-mode-btn" title="Diesel / Heavy" data-val="Diesel">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M20 8h-3V4H3v13h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-12 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM17 9.5l1.96 2.5H17v-2.5z"/></svg>
        </button>
      </div>

      <!-- Inputs -->
      <div class="gm-inputs">
        <div class="gm-dots">
          <div class="gm-dot start"></div>
          <div class="gm-line"></div>
          <div class="gm-dot end"></div>
        </div>
        <div class="gm-fields">
          <div class="autocomplete-wrapper">
            <input type="text" id="jp-start" class="gm-input" placeholder="Choose starting point..." autocomplete="off" />
            <div id="jp-start-results" class="autocomplete-items"></div>
          </div>
          <div class="autocomplete-wrapper">
            <input type="text" id="jp-end" class="gm-input" placeholder="Choose destination..." autocomplete="off" />
            <div id="jp-end-results" class="autocomplete-items"></div>
          </div>
        </div>
        <button class="gm-swap" id="btn-swap">⇅</button>
      </div>

      <!-- Vehicle Type -->
      <div class="gm-options">
        <select id="jp-vehicle" class="gm-select-small">
          <option value="Petrol">Petrol Car (ICE)</option>
          <option value="EV">Electric Vehicle (EV)</option>
          <option value="Diesel">Diesel / Heavy</option>
        </select>
        <button class="btn btn-red" id="btn-calc" style="padding: 6px 12px; font-size: 0.8rem;">Calculate</button>
      </div>
    </div>

    <!-- Results Area -->
    <div class="gm-results" id="jp-results" style="display:none;">
      
      <!-- Route Option Card -->
      <div class="gm-route-card">
        <div class="gm-rc-header">
          <div class="gm-rc-title">via AI Dynamic Tolling Route</div>
          <div class="gm-rc-time" id="res-time">3 hr 32 min</div>
        </div>
        <div class="gm-rc-dist" id="res-dist">317 km</div>
        
        <div class="gm-rc-desc">Fastest route now due to traffic conditions</div>
        <div class="gm-rc-alert">⚠️ This route has tolls.</div>
        
        <!-- EDAT Toll Breakdown -->
        <div class="gm-toll-box">
          <div class="gtb-title">EDAT Toll Calculation</div>
          <div class="gtb-row">
            <span>Base Toll</span>
            <span id="res-base">RM --</span>
          </div>
          <div class="gtb-row">
            <span>Traffic Impact <span id="res-traf-multi"></span></span>
            <span id="res-traf-fee" style="color:var(--amber)">RM --</span>
          </div>
          <div class="gtb-row">
            <span>Carbon Adj. <span id="res-carb-multi"></span></span>
            <span id="res-carb-fee" style="color:var(--green)">RM --</span>
          </div>
          <div class="gtb-row total">
            <span>Total Expected Fee</span>
            <span id="res-total">RM --</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Map Container -->
  <div id="edat-map" class="edat-map-container"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="js/edat-core.js"></script>
<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ai-agent.js"></script>
</body>
</html>
